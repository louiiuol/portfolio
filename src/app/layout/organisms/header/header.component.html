<ul
	id="navigation-links"
	class="flex gap-3 align-items-center justify-content-between">
	<li class="flex-1 sm:flex-auto">
		<a
			pButton
			id="logo"
			routerLink="/home"
			class="text-niconne text-4xl p-button-text p-button-sm line-height-1">
			<span class="hidden sm:inline-block">Louis Godlewski</span>
			<lou-icon class="max-w-2rem sm:hidden" name="logo-rounded"></lou-icon>
		</a>
	</li>
	<li *ngFor="let link of navigationLinks">
		<a pButton [routerLink]="'/' + link" class="p-button-text p-button-sm">
			{{ link }}
		</a>
	</li>
	<li>
		<button pButton (click)="contact()" class="p-button-sm p-button-secondary">
			contact
		</button>
	</li>
</ul>
